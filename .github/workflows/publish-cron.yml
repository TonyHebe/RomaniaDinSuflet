name: Publish Cron

on:
  schedule:
    # Fire every 10 minutes. GitHub Actions scheduled runs are unreliable and
    # can be silently skipped/delayed, so we fire often. The real spacing
    # between posts is enforced server-side by MIN_PUBLISH_INTERVAL_SECONDS
    # (Vercel env var) — when cooldown is active the endpoint no-ops.
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  run:
    # Pin to a stable runner image. `ubuntu-latest` currently maps to ubuntu-24.04,
    # and we've been seeing frequent "job was not acquired by Runner of type hosted"
    # cancellations. ubuntu-22.04 generally has better availability and fewer surprises.
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Call publish endpoint (batch)
        run: node scripts/publish-cron.mjs
        env:
          CRON_URL: ${{ secrets.CRON_URL }}
          MAX_CALLS_PER_RUN: 1
          # maxDuration is 120s on Vercel. The two independent AI calls now run in
          # parallel (image teaser + FB title), saving ~5–10s vs. the old sequential flow.
          # Give 130s here so the client never times out before Vercel does.
          CRON_CALL_TIMEOUT_MS: 130000
          CRON_PER_CALL_RETRIES: 1

